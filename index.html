<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Large Print Bible</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #FFFDE7;
            --text-color: #0f172a;
            --btn-bg: #0f172a;
            --btn-text: #ffffff;
            --secondary-btn: #e2e8f0;
        }

        .dark-mode {
            --bg-color: #0f172a;
            --text-color: #facc15;
            --btn-bg: #facc15;
            --btn-text: #0f172a;
            --secondary-btn: #1e293b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        .bible-text {
            font-family: Georgia, serif;
            line-height: 1.7;
        }

        .ui-font {
            font-family: system-ui, -apple-system, sans-serif;
        }

        .btn-primary {
            background-color: var(--btn-bg);
            color: var(--btn-text);
        }

        .btn-secondary {
            background-color: var(--secondary-btn);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col ui-font">

    <!-- Top Toolbar -->
    <header class="p-2 border-b border-gray-400/30 flex justify-between items-center sticky top-0 bg-inherit z-10">
        <div class="flex gap-2">
            <button onclick="changeFontSize(4)" class="p-3 rounded-xl btn-secondary font-bold active:scale-95">
                <small>Size</small> +
            </button>
            <button onclick="changeFontSize(-4)" class="p-3 rounded-xl btn-secondary font-bold active:scale-95">
                <small>Size</small> -
            </button>
        </div>
        <button onclick="toggleTheme()" class="p-3 rounded-xl btn-primary font-bold active:scale-95">
            Day/Night
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-6 max-w-2xl mx-auto w-full">
        <div id="verse-label" class="mb-4 opacity-70 font-bold uppercase border-l-4 border-current pl-4 text-lg">
            Genesis 1
        </div>
        
        <h1 id="story-title" class="font-black mb-6 leading-tight tracking-tight">
            God Makes the World
        </h1>
        
        <p id="story-content" class="bible-text font-medium">
            In the very beginning, God made the world. He made the sky, the land, and the seas. He made the sun, moon, and stars. God said, 'Let there be light!' and there was light. He looked at everything and said, 'It is very good!'
        </p>
    </main>

    <!-- Navigation -->
    <footer class="p-4 flex justify-between items-center border-t border-gray-400/30 bg-inherit sticky bottom-0">
        <button id="prev-btn" onclick="navigate(-1)" class="p-4 rounded-2xl btn-primary font-bold text-xl active:scale-95 disabled:opacity-10">
            BACK
        </button>
        
        <div id="page-indicator" class="font-bold text-lg tabular-nums px-2">
            1 / 10
        </div>
        
        <button id="next-btn" onclick="navigate(1)" class="p-4 rounded-2xl btn-primary font-bold text-xl active:scale-95 disabled:opacity-10">
            NEXT
        </button>
    </footer>

    <script>
        const stories = [
            { title: "God Makes the World", verse: "Genesis 1", content: "In the very beginning, God made the world. He made the sky, the land, and the seas. He made the sun, moon, and stars. God said, 'Let there be light!' and there was light. He looked at everything and said, 'It is very good!'" },
            { title: "The First Garden", verse: "Genesis 2", content: "God made a beautiful garden called Eden. He made the first man, Adam, from the dust. He made the first woman, Eve, to be his helper. They lived in the garden and took care of all the animals." },
            { title: "The Sad Day", verse: "Genesis 3", content: "A sneaky snake talked to Eve. He told her to eat the fruit God said not to eat. Adam and Eve both ate it. This made God very sad. They had to leave the beautiful garden." },
            { title: "Two Brothers", verse: "Genesis 4", content: "Adam and Eve had two sons named Cain and Abel. Abel loved God and gave Him his best. Cain got very angry and did a mean thing to his brother." },
            { title: "A Big Family", verse: "Genesis 5", content: "Many years passed by. Adam’s family grew and grew. One man named Enoch was a very special friend of God. He walked with God every single day." },
            { title: "Noah and the Ark", verse: "Genesis 6", content: "The world became a very mean place. Only Noah still loved God. God told Noah to build a giant boat called an Ark. Noah worked hard to build it." },
            { title: "The Great Flood", verse: "Genesis 7", content: "Noah and his family went inside the Ark. God sent two of every animal to join them. Then the rain started for forty days and forty nights." },
            { title: "The Land Dries Up", verse: "Genesis 8", content: "God sent a wind to dry up the water. Noah sent a dove to find land. Finally, the Ark landed on a tall mountain. Everyone was safe." },
            { title: "The Rainbow Promise", verse: "Genesis 9", content: "God made a promise to Noah. He said He would never flood the earth again. He put a bright rainbow in the sky as a sign of His promise." },
            { title: "Many New Nations", verse: "Genesis 10", content: "Noah’s sons had many children. They moved to different lands and started new families. This is how all the different people filled the world." }
        ];

        let currentIndex = 0;
        let currentFontSize = 28;

        function updateUI() {
            const story = stories[currentIndex];
            document.getElementById('verse-label').innerText = story.verse;
            document.getElementById('story-title').innerText = story.title;
            document.getElementById('story-content').innerText = story.content;
            document.getElementById('page-indicator').innerText = `${currentIndex + 1} / ${stories.length}`;
            
            document.getElementById('story-title').style.fontSize = `${currentFontSize * 1.3}px`;
            document.getElementById('story-content').style.fontSize = `${currentFontSize}px`;

            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-btn').disabled = currentIndex === stories.length - 1;
            window.scrollTo(0, 0);
        }

        function navigate(direction) {
            currentIndex += direction;
            updateUI();
        }

        function changeFontSize(delta) {
            currentFontSize = Math.min(Math.max(currentFontSize + delta, 18), 60);
            updateUI();
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
        }

        // Initialize
        updateUI();
    </script>
</body>
</html>
